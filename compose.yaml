  qdrant:
    # Rollback digest (known-good 2026-04-12):
    #   qdrant/qdrant@sha256:94728574965d17c6485dd361aa3c0818b325b9016dac5ea6afec7b4b2700865f
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC (optional)
    volumes:
      - ./volumes/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
  signal-api:
    # signal-cli-rest-api — outbound-only bridge to Signal's servers.
    # Bound to 127.0.0.1 so the QR-link endpoint is reachable from the host
    # during one-time device linking, but never from the internet.
    # MODE=native: signal-cli-native (GraalVM) persistent daemon — required
    # for reliable device linking. MODE=normal spawns signal-cli per-request
    # and the QR-link handshake races the process lifecycle.
    image: bbernhard/signal-cli-rest-api:latest
    environment:
      - MODE=native
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./volumes/signal-cli-config:/home/.local/share/signal-cli
    restart: unless-stopped

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:1.8
    ports:
      - "3000:3000"
    volumes:
      - ./volumes/models:/data
    environment:
      - MODEL_ID=BAAI/bge-large-en-v1.5
      - PORT=3000
      - CUDA_VISIBLE_DEVICES=3  # Set to the GPU index you want to use (e.g., 3)
    deploy:
      resources:
        reservations: # GPU Device to use is configured in shared_config.py
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  postgres_data:
