services:
  postgres:
    # Rollback digest (known-good 2026-04-12):
    #   postgres@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U havencore -d havencore"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  nginx:
    # Rollback digest (known-good 2026-04-12):
    #   nginx@sha256:582c496ccf79d8aa6f8203a79d32aaf7ffd8b13362c60a701a2f9ac64886c93d
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      agent:
        condition: service_healthy
      text-to-speech:
        condition: service_healthy
      speech-to-text:
        condition: service_started
    restart: unless-stopped
  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    image: agent:${VERSION:-latest}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./services/agent/:/app
      # - ./shared:/app/shared:ro
    ports:
      - "6002:6002" # FastAPI: UI, API, and OpenAI-compat endpoints
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  speech-to-text:
    build:
      context: ./services/speech-to-text
      dockerfile: Dockerfile
    image: speech-to-text:${VERSION:-latest}
    volumes:
      - ./services/speech-to-text/app:/app
      - ./shared:/app/shared:ro
    ports:
      - "6001:6001" # /v1/audio/transcriptions OpenAI-compat API
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
  text-to-speech:
    build:
      context: ./services/text-to-speech
      dockerfile: Dockerfile
    image: text-to-speech:${VERSION:-latest}
    ports:
      - "6005:6005" # OpenAI API-compatible /v1/audio/speech
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        reservations: # GPU Device to use is configured in shared_config.py
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./services/text-to-speech/app/output:/app/output
      - ./services/text-to-speech/app/config.py:/app/config.py
      - ./shared:/app/shared:ro
    restart: unless-stopped
  vllm:
    # Pinned to vLLM v0.19.0 — last version verified working on NVIDIA driver 580.x.
    # Floating `:latest` has shipped builds requiring driver newer than our host.
    image: vllm/vllm-openai@sha256:d9a5c1c1614c959fde8d2a4d68449db184572528a6055afdd0caf1e66fb51504
    runtime: nvidia
    # profiles: ["vllm"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./services/vllm/app:/app
    ipc: host
    # command: --model TechxGenus/Mistral-Large-Instruct-2411-AWQ --served-model-name gpt-3.5-turbo -tp 4 --max-model-len 16384 --port 8000 --enable-auto-tool-choice --tool-call-parser mistral --chat-template /app/mistral-tool-chat-template.jinja --gpu-memory-utilization .74
    command: >
      --model Qwen/Qwen2.5-72B-Instruct-AWQ
      --served-model-name gpt-3.5-turbo
      --quantization awq_marlin
      --max-num-seqs 1
      --enforce-eager
      -tp 2
      --max-model-len 16384
      --port 8000
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --gpu-memory-utilization .95
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
  iav-to-text:
      build:
        context: ./services/iav-to-text
        dockerfile: Dockerfile
      runtime: nvidia
      environment:
        - CUDA_VISIBLE_DEVICES=2
      ports:
        - "8100:8100"  # vLLM API port
        - "8110:8110"  # Gradio UI port
      volumes:
        - ~/.cache/huggingface:/root/.cache/huggingface
        - ./services/iav-to-text/app:/app
      ipc: host
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8100/v1/models"]
        interval: 15s
        timeout: 5s
        retries: 5
        start_period: 300s
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      restart: unless-stopped
  mosquitto:
    # Rollback digest (known-good 2026-04-12):
    #   eclipse-mosquitto@sha256:9cfdd46ad59f3e3e5f592f6baf57ab23e1ad00605509d0f5c1e9b179c5314d87
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "1883:1883"    # MQTT port
      - "9001:9001"    # Websocket port (optional, useful for web clients)
    volumes:
      - ./services/mosquitto/config:/mosquitto/config
      - ./services/mosquitto/data:/mosquitto/data
      - ./services/mosquitto/log:/mosquitto/log
    # healthcheck:
    #   test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3

  text-to-image:
    build:
      context: ./services/text-to-image
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8188:8188"  # UI and API port
    volumes:
      # Model directories - mount your existing models here
      - ./services/text-to-image/models:/app/models
      - ./services/text-to-image/output:/app/output
      - ./services/text-to-image/input:/app/input
      - ./services/text-to-image/custom_nodes:/app/custom_nodes
      # - ./services/text-to-image/cache:/root/.cache

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Optional: Set GPU memory limit (in MB)
      # - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      
      # Optional: Enable xformers for memory efficiency
      # - COMMANDLINE_ARGS=--use-pytorch-cross-attention
      
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  comfyui-manager-installer:
    image: alpine:latest
    container_name: comfyui-manager-installer
    volumes:
      - ./services/text-to-image/custom_nodes:/custom_nodes
    entrypoint: /bin/sh
    command: -c "apk add --no-cache git && if [ ! -d /custom_nodes/ComfyUI-Manager ]; then git clone https://github.com/ltdrdata/ComfyUI-Manager.git /custom_nodes/ComfyUI-Manager; fi"

  # llamacpp:
