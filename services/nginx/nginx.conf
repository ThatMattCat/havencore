events {
    worker_connections 1024;
}

http {
    upstream vllm_service {
        server vllm:8000;
    }

    upstream tts_service {
        server text-to-speech:6005;
    }

    upstream stt_service {
        server speech-to-text:6001;
    }

    server {
        listen 80;

        # Re-resolve `agent` hostname against Docker's embedded DNS so nginx
        # picks up the new container IP after `docker compose restart agent`.
        resolver 127.0.0.11 valid=10s ipv6=off;

        location /health {
            access_log off;
            return 200 "AI Gateway healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Agent LLM endpoint (via Agent- NOT real OpenAI-compat
        # Accept OpenAI-compat request but only pulls latest message.
        # because the Agent handles conversation history...hacky)
        location /v1/chat/completions {
            set $agent_upstream "agent:6002";
            proxy_pass http://$agent_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # vLLM direct connect, no Agent but full OpenAI-compat)
        location /v2/chat/completions {
            proxy_pass http://vllm_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
        
        location /v2/completions {
            proxy_pass http://vllm_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
        # TODO: Serve v1 and v2? 
        location /v1/models {
            proxy_pass http://vllm_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # TTS endpoint
        location /v1/audio/speech {
            proxy_pass http://tts_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 10M;
        }
        
        # STT endpoints
        location /v1/audio/transcriptions {
            proxy_pass http://stt_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 25M;
        }
        
        location /v1/audio/translations {
            proxy_pass http://stt_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 25M;
        }
        
        # Agent WebSocket
        location /ws/ {
            set $agent_upstream "agent:6002";
            proxy_pass http://$agent_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        # Agent REST API
        location /api/ {
            set $agent_upstream "agent:6002";
            proxy_pass http://$agent_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
            # /api/vision/ask accepts phone-camera photos (5-15 MB) and video
            # clips (a 3-min 1080p H.264 clip is ~150-200 MB; phone footage
            # at 10-15 Mbps can hit ~340 MB). 300 MB covers ~3 min of typical
            # 1080p phone video with margin while keeping a sane upper bound.
            # NOTE: bind-mount inode pitfall — atomic-save editors change the
            # inode, so the running container sees the OLD file until
            # `docker compose up -d --force-recreate nginx`. `restart` is not
            # enough.
            client_max_body_size 300M;
        }

        # Agent UI (legacy path, redirects to root SPA)
        location /agent/ {
            return 301 /;
        }

        # Satellite OTA firmware blobs — served straight from disk, no auth (LAN only).
        # Host path: ./volumes/firmware/   →   served at /firmware/
        # Whole-file GETs only (esp_https_ota); no autoindex, no compression.
        location /firmware/ {
            alias /usr/share/havencore/firmware/;
            default_type application/octet-stream;
            types { application/json json; }
            autoindex off;
            gzip off;
        }

        # ntfy/UnifiedPush server for companion-app push notifications.
        # ntfy refuses sub-path hosting (its web UI uses absolute asset
        # paths), so this is a 301 redirect to the :8585 host port,
        # not a reverse proxy. Phone-side ntfy app config and the
        # generated UnifiedPush endpoints both use http://<host>:8585
        # directly; this redirect is a humans-typing-in-browsers
        # convenience.
        location = /ntfy { return 301 $scheme://$host:8585/; }
        location /ntfy/ { return 301 $scheme://$host:8585/; }

        # SvelteKit SPA — catch-all fallback to agent service
        location / {
            set $agent_upstream "agent:6002";
            proxy_pass http://$agent_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}